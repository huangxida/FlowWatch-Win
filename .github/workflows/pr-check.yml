name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  whitespace:
    name: Check whitespace
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changed lines for whitespace errors
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "pull_request") {
            git diff --check "origin/$env:GITHUB_BASE_REF...HEAD"
          } else {
            git diff --check HEAD~1..HEAD
          }

  build:
    name: Build ${{ matrix.configuration }} x64
    runs-on: windows-latest
    needs: whitespace

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    defaults:
      run:
        working-directory: FlowWatch.Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Restore NuGet packages
        run: nuget restore FlowWatch.sln -NonInteractive

      - name: Build ${{ matrix.configuration }} x64
        run: msbuild FlowWatch.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /m /v:minimal
