name: PR Check

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows app
    runs-on: windows-latest

    defaults:
      run:
        working-directory: FlowWatch.Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Restore NuGet packages
        run: nuget restore FlowWatch.sln -NonInteractive

      - name: Build Release x64
        run: msbuild FlowWatch.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal
